name: Daily Safe Updates

on:
  schedule:
    - cron: "50 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  merge-safe-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Triage Dependabot pull requests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: node ./scripts/daily-safe-updates.mjs

      - name: Merge ready daily changelog PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          pr="$(gh pr list --repo "$REPOSITORY" --search "is:open head:automation/daily-changelog" --json number --jq '.[0].number')"

          if [ -z "$pr" ] || [ "$pr" = "null" ]; then
            echo "No open daily changelog PR found"
            exit 0
          fi

          merge_state="$(gh pr view "$pr" --repo "$REPOSITORY" --json mergeStateStatus,isDraft --jq 'if .isDraft then "DRAFT" else .mergeStateStatus end')"
          echo "Daily changelog PR #$pr merge state: $merge_state"

          if [ "$merge_state" = "DRAFT" ] || [ "$merge_state" = "BEHIND" ]; then
            echo "Skipping #$pr until it is merge-ready"
            exit 0
          fi

          if ! gh pr checks "$pr" --repo "$REPOSITORY" --required >/dev/null 2>&1; then
            echo "Skipping #$pr because required checks are not green yet"
            exit 0
          fi

          gh pr merge "$pr" --repo "$REPOSITORY" --squash --delete-branch

      - name: Merge labeled Dependabot updates that are ready
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          prs="$(gh pr list --repo "$REPOSITORY" --search "is:open label:automerge author:app/dependabot" --json number --jq '.[].number')"

          if [ -z "$prs" ]; then
            echo "No open labeled Dependabot PRs found"
            exit 0
          fi

          while IFS= read -r pr; do
            if [ -z "$pr" ]; then
              continue
            fi

            merge_state="$(gh pr view "$pr" --repo "$REPOSITORY" --json mergeStateStatus,isDraft --jq 'if .isDraft then "DRAFT" else .mergeStateStatus end')"
            echo "PR #$pr merge state: $merge_state"

            if [ "$merge_state" = "DRAFT" ]; then
              echo "Skipping #$pr because it is a draft PR"
              continue
            fi

            if [ "$merge_state" = "BEHIND" ]; then
              echo "Skipping #$pr because it is waiting on a Dependabot rebase"
              continue
            fi

            if ! gh pr checks "$pr" --repo "$REPOSITORY" --required >/dev/null 2>&1; then
              echo "Skipping #$pr because required checks are not green yet"
              continue
            fi

            gh pr merge "$pr" --repo "$REPOSITORY" --squash --delete-branch
          done <<<"$prs"
