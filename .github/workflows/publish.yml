name: publish

permissions:
  contents: read

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name != 'release' || !startsWith(github.event.release.tag_name, 'daily-') }}
    runs-on: ubuntu-latest
    env:
      OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
      VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - run: corepack enable && pnpm install --frozen-lockfile

      - name: Package VSIX
        id: package_extension
        run: |
          pnpm run package
          VSIX_PATH="$(find . -maxdepth 1 -name '*.vsix' -print -quit)"
          if [ -z "$VSIX_PATH" ]; then
            echo "No VSIX was generated." >&2
            exit 1
          fi
          echo "vsix_path=$VSIX_PATH" >> "$GITHUB_OUTPUT"

      - name: Publish to Open VSX
        if: env.OPEN_VSX_TOKEN != ''
        run: pnpm dlx ovsx -p "$OPEN_VSX_TOKEN" publish -i "${{ steps.package_extension.outputs.vsix_path }}" --skip-duplicate

      - name: Publish to VS Marketplace
        if: env.VS_MARKETPLACE_TOKEN != ''
        run: pnpm dlx @vscode/vsce publish --packagePath "${{ steps.package_extension.outputs.vsix_path }}" --skip-duplicate -p "$VS_MARKETPLACE_TOKEN"
