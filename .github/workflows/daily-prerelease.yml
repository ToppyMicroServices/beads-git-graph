name: Daily Prerelease

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

concurrency:
  group: daily-prerelease
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh-changelog:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh unreleased changelog snapshot
        run: node ./scripts/daily-release.mjs --write-changelog

      - name: Format generated changelog
        run: pnpm exec oxfmt CHANGELOG.md

      - name: Commit refreshed changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "No changelog changes to commit"
            exit 0
          fi

          BRANCH="automation/daily-changelog"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add CHANGELOG.md
          git commit -m "docs: refresh unreleased changelog"
          git push --force-with-lease origin "$BRANCH"

          existing_pr="$(gh pr list --repo "$REPOSITORY" --head "$BRANCH" --base main --json number --jq '.[0].number')"
          if [ -z "$existing_pr" ] || [ "$existing_pr" = "null" ]; then
            gh pr create \
              --repo "$REPOSITORY" \
              --base main \
              --head "$BRANCH" \
              --title "docs: refresh unreleased changelog" \
              --body "Automated daily changelog snapshot refresh for the unreleased section."
          else
            gh pr edit "$existing_pr" --repo "$REPOSITORY" --title "docs: refresh unreleased changelog" --body "Automated daily changelog snapshot refresh for the unreleased section."
          fi

          # PRs created via GITHUB_TOKEN do not emit pull_request workflow runs.
          # Dispatch CI explicitly so the protected lint check is reported.
          gh workflow run ci.yaml --repo "$REPOSITORY" --ref "$BRANCH" -f run_cross_platform=false

  package-daily-prerelease:
    needs: refresh-changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
      VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22

      - name: Detect unreleased commits
        run: |
          node ./scripts/daily-release.mjs --write-has-unreleased /tmp/daily-has-unreleased.txt
          echo "HAS_UNRELEASED_COMMITS=$(cat /tmp/daily-has-unreleased.txt)" >> "$GITHUB_ENV"

      - name: Skip when no unreleased commits are queued
        if: env.HAS_UNRELEASED_COMMITS != 'true'
        run: echo "Skipping daily prerelease packaging because no unreleased commits were found."

      - if: env.HAS_UNRELEASED_COMMITS == 'true'
        run: corepack enable

      - name: Install dependencies
        if: env.HAS_UNRELEASED_COMMITS == 'true'
        run: pnpm install --frozen-lockfile

      - name: Format check
        if: env.HAS_UNRELEASED_COMMITS == 'true'
        run: pnpm run format

      - name: Run lint
        if: env.HAS_UNRELEASED_COMMITS == 'true'
        run: pnpm run lint

      - name: Run typecheck
        if: env.HAS_UNRELEASED_COMMITS == 'true'
        run: pnpm run typecheck

      - name: Run tests
        if: env.HAS_UNRELEASED_COMMITS == 'true'
        run: pnpm test

      - name: Generate daily release notes and version
        if: env.HAS_UNRELEASED_COMMITS == 'true'
        run: |
          node ./scripts/daily-release.mjs --write-changelog
          pnpm exec oxfmt CHANGELOG.md
          node ./scripts/daily-release.mjs --write-release-notes /tmp/daily-release-notes.md --write-version /tmp/daily-version.txt
          echo "DAILY_VERSION=$(cat /tmp/daily-version.txt)" >> "$GITHUB_ENV"

      - name: Set daily prerelease version
        if: env.HAS_UNRELEASED_COMMITS == 'true'
        run: node ./scripts/daily-release.mjs --set-package-version "$DAILY_VERSION"

      - name: Package VSIX
        if: env.HAS_UNRELEASED_COMMITS == 'true'
        run: pnpm dlx @vscode/vsce package --no-dependencies --pre-release

      - name: Locate VSIX
        if: env.HAS_UNRELEASED_COMMITS == 'true'
        id: locate_vsix
        run: |
          VSIX_PATH="$(find . -maxdepth 1 -name '*.vsix' -print -quit)"
          if [ -z "$VSIX_PATH" ]; then
            echo "No VSIX was generated." >&2
            exit 1
          fi
          echo "vsix_path=$VSIX_PATH" >> "$GITHUB_OUTPUT"

      - name: Publish or update daily prerelease
        if: env.HAS_UNRELEASED_COMMITS == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="daily-$(date -u +%Y%m%d)"
          TITLE="Daily Prerelease $(date -u +%Y-%m-%d)"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file /tmp/daily-release-notes.md --prerelease
            gh release upload "$TAG" "${{ steps.locate_vsix.outputs.vsix_path }}" --clobber
          else
            gh release create "$TAG" "${{ steps.locate_vsix.outputs.vsix_path }}" --title "$TITLE" --notes-file /tmp/daily-release-notes.md --prerelease
          fi

      - name: Publish daily prerelease to Open VSX
        if: env.HAS_UNRELEASED_COMMITS == 'true' && env.OPEN_VSX_TOKEN != ''
        run: pnpm dlx ovsx -p "$OPEN_VSX_TOKEN" publish -i "${{ steps.locate_vsix.outputs.vsix_path }}" --skip-duplicate

      - name: Publish daily prerelease to VS Marketplace
        if: env.HAS_UNRELEASED_COMMITS == 'true' && env.VS_MARKETPLACE_TOKEN != ''
        run: pnpm dlx @vscode/vsce publish --packagePath "${{ steps.locate_vsix.outputs.vsix_path }}" --skip-duplicate --pre-release -p "$VS_MARKETPLACE_TOKEN"

      - name: Upload VSIX artifact
        if: env.HAS_UNRELEASED_COMMITS == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: daily-prerelease-vsix
          path: ${{ steps.locate_vsix.outputs.vsix_path }}
